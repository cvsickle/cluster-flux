apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: redis-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: redis-operator
    namespace: redis-system
  values:
    replicas: 3
    featureGates:
      GenerateConfigInInitContainer: true
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - redis-operator
            topologyKey: kubernetes.io/hostname
