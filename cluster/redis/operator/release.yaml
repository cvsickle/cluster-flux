apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: redis-operator
  namespace: redis-system
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: redis-operator
    namespace: redis-system
  values:
    replicas: 3
    featureGates:
      GenerateConfigInInitContainer: true
