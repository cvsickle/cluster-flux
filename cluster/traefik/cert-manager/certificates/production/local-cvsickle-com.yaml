---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-cvsickle-com
  namespace: default
spec:
  secretName: local-cvsickle-com-tls
  issuerRef:
    name: letsencrypt-production
    kind: ClusterIssuer
  commonName: "*.local.cvsickle.com"
  dnsNames:
    - "local.cvsickle.com"
    - "*.local.cvsickle.com"