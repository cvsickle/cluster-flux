---
apiVersion: storage.k8s.io/v1
kind: StorageClass
metadata:
  name: longhorn-cnpg-1r
provisioner: driver.longhorn.io
allowVolumeExpansion: true
parameters:
  # Crucial: Only one replica is needed. CNPG handles app-level replication.
  numberOfReplicas: "1" 
  # Ensures data stays on the same node as the pod for low latency
  dataLocality: "strict-local"
  # Optional: Customize the filesystem type
  fsType: "ext4"
  # Recommended for database workloads
  staleReplicaTimeout: "28800" # 8 hours 
reclaimPolicy: Delete
volumeBindingMode: Immediate