apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
  namespace: longhorn-system
spec:
  chartRef:
    kind: OCIRepository
    name: longhorn
    namespace: longhorn-system
  interval: 5m0s
  values:
    controller:
      replicas: 3
    engine:
      replicas: 3
    manager:
      replicas: 3
    upgradeVersionCheck: false
    defaultBackupStore:
      backupTarget: cifs://10.69.1.40/snapshots/longhorn/
      backupTargetCredentialSecret: longhorn-cifs-monolith
      pollInterval: 180
    defaultSettings:
      nodeDrainPolicy: always-allow
      defaultDataPath: /mnt/k3s/longhorn
