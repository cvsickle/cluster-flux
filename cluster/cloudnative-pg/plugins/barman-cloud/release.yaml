apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cnpg-plugin-barman-cloud
  namespace: cnpg-system
spec:
  interval: 5m
  chart:
    spec:
      chart: plugin-barman-cloud
      version: 0.4.0 # {"$imagepolicy": "flux-system:cnpg-plugin-barman-cloud:tag"}
      sourceRef:
        kind: HelmRepository
        name: cnpg
        namespace: cnpg-system
      interval: 1m
  values:
    replicaCount: 1
    image:
      pullPolicy: Always
