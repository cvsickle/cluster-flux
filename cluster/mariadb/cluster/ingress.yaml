---
apiVersion: traefik.io/v1alpha1
kind: IngressRouteTCP
metadata:
  name: mariadb-cluster
  namespace: mariadb-system
  annotations: 
    kubernetes.io/ingress.class: traefik-local
spec:
  entryPoints:
    - mariadb
  routes:
    - match: HostSNI(`*`)
      services:
        - name: mariadb-cluster
          port: 3306