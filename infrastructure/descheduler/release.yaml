---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: descheduler
  namespace: kube-system
spec:
  interval: 15m
  chart:
    spec:
      chart: descheduler
      version: '0.34.0'
      sourceRef:
        kind: HelmRepository
        name: descheduler
        namespace: kube-system
      interval: 5m
  values:
    kind: CronJob
    schedule: "*/2 * * * *"