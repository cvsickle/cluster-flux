---
apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: local-cvsickle-com-staging
  namespace: default
spec:
  secretName: local-cvsickle-com-staging-tls
  issuerRef:
    name: letsencrypt-staging
    kind: ClusterIssuer
  commonName: "*.local.cvsickle.com"
  dnsNames:
    - "local.cvsickle.com"
    - "*.local.cvsickle.com"
  secretTemplate:
    annotations:
      reflector.v1.k8s.emberstack.com/reflection-allowed: "true"
      reflector.v1.k8s.emberstack.com/reflection-allowed-namespaces: ""