apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: monitor
  namespace: kube-prometheus
spec:
  interval: 5m
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 82.16.2 # {"$imagepolicy": "flux-system:kube-prometheus:tag"}
      sourceRef:
        kind: HelmRepository
        name: kube-prometheus
        namespace: kube-prometheus
      interval: 1m
  values:
    crds:
      enabled: true
    windowsMonitoring:
      enabled: false
    alertmanager:
      enabled: false
    grafana:
      enabled: true
      defaultDashboardsTimezone: America/New_York
      admin:
        existingSecret: monitor-grafana-auth
        userKey: username
        passwordKey: password
      persistence:
        enabled: true
        type: sts
        storageClassName: longhorn
        accessModes:
          - ReadWriteOnce
        size: 8Gi
        finalizers:
          - kubernetes.io/pvc-protection
    kubernetesServiceMonitors:
      enabled: true
    kubeApiServer:
      enabled: false
    kubelet:
      enabled: true
    kubeControllerManager:
      enabled: false
    coreDns:
      enabled: true
    kubeDns:
      enabled: false
    kubeEtcd:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    kubeStateMetrics:
      enabled: true
    nodeExporter:
      enabled: true
      operatingSystems:
        linux:
          enabled: true
        aix:
          enabled: false
        darwin:
          enabled: false
    prometheusOperator:
      enabled: true
    prometheus:
      enabled: true
    thanosRuler:
      enabled: false
    cleanPrometheusOperatorObjectNames: true
