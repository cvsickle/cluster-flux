---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: paperless-ai
  namespace: default
  annotations: 
    kubernetes.io/ingress.class: traefik-local
spec:
  entryPoints:
    - websecure
  tls:
    secretName: local-cvsickle-com-tls
  routes:
    - match: Host(`paperless-ai.local.cvsickle.com`)
      kind: Rule
      services:
        - name: paperless-ai
          namespace: external-apps
          port: 3001