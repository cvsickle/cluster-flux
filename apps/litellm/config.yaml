---
apiVersion: v1
kind: ConfigMap
metadata:
  name: litellm
  namespace: litellm
data:
  config.yaml: |
    model_list:

      - model_name: claude-haiku-4-5
        litellm_params:
          model: anthropic/claude-haiku-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          reasoning_effort: low
          max_tokens: 32000
        model_info:
          health_check_max_tokens: 2048

      - model_name: claude-sonnet-4-5
        litellm_params:
          model: anthropic/claude-sonnet-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          reasoning_effort: medium
          max_tokens: 64000
        model_info:
          health_check_max_tokens: 4096
      - model_name: claude-sonnet-4-6
        litellm_params:
          model: anthropic/claude-sonnet-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          reasoning_effort: medium
      - model_name: claude-sonnet-5
        litellm_params:
          model: anthropic/claude-sonnet-5
          api_key: os.environ/ANTHROPIC_API_KEY
          thinking:
            type: adaptive
            display: summarized

      - model_name: claude-opus-4-5
        litellm_params:
          model: anthropic/claude-opus-4-5
          api_key: os.environ/ANTHROPIC_API_KEY
          reasoning_effort: medium
          max_tokens: 64000
        model_info:
          health_check_max_tokens: 4096
      - model_name: claude-opus-4-6
        litellm_params:
          model: anthropic/claude-opus-4-6
          api_key: os.environ/ANTHROPIC_API_KEY
          reasoning_effort: medium
      - model_name: claude-opus-4-8
        litellm_params:
          model: anthropic/claude-opus-4-8
          api_key: os.environ/ANTHROPIC_API_KEY
          thinking:
            type: adaptive
            display: summarized

      - model_name: nomic-embed-text-v2-moe
        litellm_params:
          model: ollama/nomic-embed-text-v2-moe:latest
          api_base: "http://10.69.1.52:11434"
        model_info:
          mode: embedding
      - model_name: nomic-embed-text-v2-moe
        litellm_params:
          model: ollama/nomic-embed-text-v2-moe:latest
          api_base: "http://10.69.1.70:11434"
        model_info:
          mode: embedding
      
      - model_name: llama3.2
        litellm_params:
          model: ollama_chat/llama3.2:3b
          api_base: "http://10.69.1.52:11434"
      - model_name: llama3.2
        litellm_params:
          model: ollama_chat/llama3.2:3b
          api_base: "http://10.69.1.70:11434"
      
      - model_name: gpt-oss
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.52:11434"
      - model_name: gpt-oss
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.70:11434"
      
      - model_name: gpt-oss-task
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.52:11434"
          top_p: 0.5
          reasoning_effort: low
      - model_name: gpt-oss-task
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.70:11434"
          top_p: 0.5
          reasoning_effort: low
      
      - model_name: gpt-oss-deep
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.52:11434"
          reasoning_effort: high
      - model_name: gpt-oss-deep
        litellm_params:
          model: ollama_chat/gpt-oss:20b
          api_base: "http://10.69.1.70:11434"
          reasoning_effort: high
      
      - model_name: minicpm-v
        litellm_params:
          model: ollama/minicpm-v:8b
          api_base: "http://10.69.1.52:11434"
      - model_name: minicpm-v
        litellm_params:
          model: ollama/minicpm-v:8b
          api_base: "http://10.69.1.70:11434"
      
      - model_name: qwen3-vl-2b
        litellm_params:
          model: ollama/qwen3-vl:2b
          api_base: "http://10.69.1.52:11434"
      - model_name: qwen3-vl-2b
        litellm_params:
          model: ollama/qwen3-vl:2b
          api_base: "http://10.69.1.70:11434"

      - model_name: ornith
        litellm_params:
          model: ollama_chat/robit/ornith-vision:9b
          api_base: "http://10.69.1.52:11434"
      - model_name: ornith
        litellm_params:
          model: ollama_chat/robit/ornith-vision:9b
          api_base: "http://10.69.1.70:11434"

    general_settings:
      store_model_in_db: True
      store_prompts_in_spend_logs: True
      user_header_mappings:
        - header_name: X-OpenWebUI-User-Id
          litellm_user_role: internal_user
        - header_name: X-OpenWebUI-User-Email
          litellm_user_role: customer

    litellm_settings:
      drop_params: True
      modify_params: True
      cache: True
      cache_params:
        type: redis
        host: litellm-redis-master.litellm.svc.cluster.local
        port: 6379
        
    router_settings:
      routing_strategy: simple-shuffle
      redis_host: litellm-redis-master.litellm.svc.cluster.local
      redis_port: 6379
