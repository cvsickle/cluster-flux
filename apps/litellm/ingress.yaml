---
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: litellm
  namespace: litellm
  annotations: 
    kubernetes.io/ingress.class: traefik-local
spec:
  entryPoints:
    - websecure
  tls:
    secretName: local-cvsickle-com-tls
  routes:
    - match: Host(`litellm.local.cvsickle.com`)
      kind: Rule
      services:
        - name: litellm
          port: 4000
          sticky:
            cookie:
              name: litellm_affinity
              httpOnly: true
              secure: true