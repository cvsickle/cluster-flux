apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: linkding
  namespace: linkding
spec:
  interval: 5m
  chartRef:
    kind: OCIRepository
    name: linkding
    namespace: linkding
  values:
    controller:
      kind: Deployment
      replicas: 2
      updateStrategy:
        type: RollingUpdate
        rollingUpdate:
          maxUnavailable: 1
          maxSurge: 1
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchExpressions:
                - key: app.kubernetes.io/name
                  operator: In
                  values:
                    - linkding
            topologyKey: kubernetes.io/hostname
    env:
      - name: TZ
        value: "America/New_York"
      - name: LD_SUPERUSER_NAME
        valueFrom:
          secretKeyRef:
            name: linkding-auth
            key: username
      - name: LD_SUPERUSER_PASSWORD
        valueFrom:
          secretKeyRef:
            name: linkding-auth
            key: password
      - name: LD_DISABLE_URL_VALIDATION
        value: "True"
      - name: LD_DB_ENGINE
        value: "postgres"
      - name: LD_DB_DATABASE
        value: "linkding"
      - name: LD_DB_USER
        valueFrom:
          secretKeyRef:
            name: cnpg-linkding-auth
            key: username
      - name: LD_DB_PASSWORD
        valueFrom:
          secretKeyRef:
            name: cnpg-linkding-auth
            key: password
      - name: LD_DB_HOST
        value: cnpg-cluster-rw.cnpg-system.svc.cluster.local
      - name: LD_DB_PORT
        value: "5432"
      - name: LD_CSRF_TRUSTED_ORIGINS
        value: "https://linkding.local.cvsickle.com,https://link.cvsickle.com"
    persistentVolumeClaim:
      create: false
      existingPersistentVolumeClaim: linkding-favicons
      mountPath: /etc/linkding/data/favicons
    ports:
      http:
        port: 9090
    resources:
      requests:
        cpu: "50m"
        memory: "256Mi"
      limits:
        memory: "512Mi"
